{% extends "base.html" %}

{% block title %}Timeline - EverTimeline{% endblock %}

{% block content %}
<section class="page-heading">
    <h1>Timeline</h1>
    <a class="button secondary" href="{{ url_for('birthday') }}">Edit birthday</a>
</section>

<section class="timeline-frame" aria-label="Year timeline">
    <button class="button primary view-all-button" id="view-all-button" type="button">View all</button>
    <button class="button secondary view-random-button" id="view-random-button" type="button">View random</button>
    <div class="year-grid">
        {% for year in years %}
            <a class="timeline-button counted-button" href="{{ url_for('year_view', year=year) }}">
                <span>{{ year }}</span>
                {% if year_counts.get(year, 0) %}
                    <span class="count-badge">{{ year_counts[year] }}</span>
                {% endif %}
            </a>
        {% endfor %}
    </div>
</section>

{% include "carousel_modal.html" %}
{% endblock %}
