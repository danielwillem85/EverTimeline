{% extends "base.html" %}

{% block title %}Forgot password - EverTimeline{% endblock %}

{% block content %}
<section class="auth-panel">
    <h1>Forgot password</h1>
    <form method="post" class="form-stack">
        <label>
            <span>Username or email address</span>
            <input name="identifier" value="{{ identifier }}" autocomplete="username" required>
        </label>
        <button class="button primary" type="submit">Create reset link</button>
    </form>

    {% if reset_url %}
        <div class="reset-link-box">
            <p class="muted">Use this local reset link within one hour.</p>
            <a href="{{ reset_url }}">{{ reset_url }}</a>
        </div>
    {% endif %}

    <p class="muted auth-link-row"><a href="{{ url_for('login') }}">Back to log in</a></p>
</section>
{% endblock %}
