{% extends "base.html" %}

{% block title %}Splash - EverTimeline{% endblock %}
{% block shell_class %}splash-shell{% endblock %}

{% block content %}
<section
    class="splash-page"
    data-splash
    data-splash-url="{{ url_for('splash_photos') }}"
    data-splash-seed="{{ seed }}"
    aria-label="Random photo wall"
>
    <div class="splash-grid" data-splash-grid aria-live="polite"></div>
    <p class="splash-status" data-splash-status>Loading photos...</p>
    <button class="splash-page-button splash-page-prev" type="button" data-splash-prev aria-label="Previous thumbnails">&lt;</button>
    <button class="splash-page-button splash-page-next" type="button" data-splash-next aria-label="Next thumbnails">&gt;</button>
    <div class="splash-page-count" data-splash-count></div>
</section>

<div class="modal" id="splash-photo-modal" hidden>
    <div class="modal-backdrop" data-close-splash-photo-modal></div>
    <section class="modal-panel photo-modal-panel splash-photo-modal-panel" role="dialog" aria-modal="true" aria-labelledby="splash-photo-modal-title">
        <header class="modal-header">
            <div>
                <h2 id="splash-photo-modal-title">Picture</h2>
                <p id="splash-photo-modal-date" class="muted"></p>
            </div>
            <button class="icon-button" type="button" data-close-splash-photo-modal aria-label="Close popup">x</button>
        </header>
        <div class="splash-photo-modal-body">
            <img id="splash-photo-modal-image" class="modal-image" alt="Selected splash picture">
        </div>
    </section>
</div>
{% endblock %}
