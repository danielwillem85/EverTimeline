{% extends "base.html" %}

{% block title %}Bulk actions {{ month_name }} {{ year }} - EverTimeline{% endblock %}
{% block shell_class %}splash-shell{% endblock %}

{% block content %}
<section
    class="splash-page chapter-bulk-select-page month-bulk-actions-page"
    data-month-bulk-actions
    data-photo-url="{{ url_for('month_bulk_delete_photos', year=year, month=month) }}"
    data-delete-url="{{ url_for('api_month_bulk_delete_photos', year=year, month=month) }}"
    data-visibility-url="{{ url_for('api_month_bulk_photo_visibility', year=year, month=month) }}"
    data-bulk-add-url="{{ url_for('api_chapter_bulk_add') }}"
    data-bulk-create-url="{{ url_for('api_chapter_bulk_create') }}"
    data-return-url="{{ url_for('month_view', year=year, month=month) }}"
    aria-label="Bulk photo actions"
>
    <div class="chapter-bulk-toolbar month-bulk-actions-toolbar">
        <a class="button secondary small" href="{{ url_for('month_view', year=year, month=month) }}">{{ month_name }}</a>
        <strong>Bulk actions</strong>
        <div class="month-bulk-action-controls">
            <button class="button secondary small" type="button" data-month-bulk-select-all disabled>
                Select all photos
            </button>
            <label class="month-bulk-control">
                <span>Visibility</span>
                <select class="chapter-bulk-chapter-select" data-month-bulk-visibility-select disabled>
                    <option value="">Change visibility</option>
                    {% for tag in tag_choices %}
                        <option value="{{ tag }}">{{ privacy_labels[tag] }}</option>
                    {% endfor %}
                </select>
            </label>
            <label class="month-bulk-control">
                <span>Chapter</span>
                <select class="chapter-bulk-chapter-select" data-month-bulk-chapter-select disabled>
                    <option value="">Choose chapter</option>
                    {% for chapter in chapters %}
                        <option value="{{ chapter['id'] }}">{{ chapter["title"] }}</option>
                    {% endfor %}
                    <option value="__new__">New chapter</option>
                </select>
            </label>
            <form class="chapter-bulk-save-form month-bulk-delete-form" data-month-bulk-delete-form>
                <button class="button danger small month-bulk-delete-button" type="submit" data-month-bulk-delete-button disabled>
                    Delete selected
                </button>
            </form>
            <span class="chapter-bulk-action-status" data-month-bulk-action-status aria-live="polite"></span>
        </div>
        <div class="chapter-bulk-progress">
            <div class="chapter-bulk-progress-row">
                <span data-month-bulk-selected-count>0 selected</span>
                <span data-month-bulk-total-count>0 photos total</span>
            </div>
            <progress max="1" value="0" data-month-bulk-selected-progress aria-label="Selected photos progress"></progress>
        </div>
    </div>

    <div class="splash-grid" data-month-bulk-grid aria-live="polite"></div>
    <p class="splash-status" data-month-bulk-status>Loading photos...</p>
    <button class="splash-page-button splash-page-prev" type="button" data-month-bulk-prev aria-label="Previous thumbnails">&lt;</button>
    <button class="splash-page-button splash-page-next" type="button" data-month-bulk-next aria-label="Next thumbnails">&gt;</button>
    <div class="splash-page-count chapter-bulk-page-progress" data-month-bulk-page-count-wrap>
        <span data-month-bulk-page-count></span>
        <progress max="1" value="0" data-month-bulk-page-progress aria-label="Photo page progress"></progress>
    </div>
</section>

<div class="modal" id="month-bulk-new-modal" hidden>
    <div class="modal-backdrop" data-close-month-bulk-new></div>
    <section class="modal-panel chapter-bulk-new-panel" role="dialog" aria-modal="true" aria-labelledby="month-bulk-new-title">
        <header class="modal-header">
            <div>
                <h2 id="month-bulk-new-title">New chapter</h2>
                <p class="muted" data-month-bulk-new-count>0 selected</p>
            </div>
            <button class="icon-button" type="button" data-close-month-bulk-new aria-label="Close popup">x</button>
        </header>
        <form class="chapter-bulk-new-form" data-month-bulk-new-form>
            <label>
                <span>Name</span>
                <input name="title" maxlength="140" required autocomplete="off">
            </label>
            <label>
                <span>Description</span>
                <textarea name="description" rows="5"></textarea>
            </label>
            <p class="form-status" data-month-bulk-new-status aria-live="polite"></p>
            <div class="form-actions">
                <button class="button secondary" type="button" data-close-month-bulk-new>Cancel</button>
                <button class="button primary" type="submit">Save</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
