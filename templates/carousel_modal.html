<div
    class="modal"
    id="all-items-modal"
    data-items-url="{{ carousel_items_url|default(url_for('timeline_items')) }}"
    data-skip-tag-filter="{{ 'true' if carousel_skip_tag_filter|default(false) else 'false' }}"
    hidden
>
    <div class="modal-backdrop" data-close-all-items></div>
    <section class="modal-panel all-items-panel" role="dialog" aria-modal="true" aria-labelledby="all-items-title">
        <header class="modal-header all-items-header">
            <div class="all-items-title-row">
                <h2 id="all-items-title">View all</h2>
                <p id="all-items-meta" class="muted"></p>
            </div>
            <div class="all-items-controls">
                <div class="carousel-speed-control" aria-label="Carousel speed">
                    <span class="carousel-speed-label">Speed</span>
                    <button class="button secondary small speed-step-button" id="carousel-speed-down" type="button" aria-label="Decrease display time">-</button>
                    <span class="carousel-speed-value" id="carousel-speed-value">1.50s</span>
                    <button class="button secondary small speed-step-button" id="carousel-speed-up" type="button" aria-label="Increase display time">+</button>
                </div>
                <button class="button secondary small carousel-control-button" id="carousel-pause-button" type="button" hidden>Pause</button>
                <div class="carousel-step-controls" id="carousel-step-controls" aria-label="Manual carousel controls" hidden>
                    <button class="button secondary small carousel-step-button" id="carousel-step-left" type="button" aria-label="Move carousel left">&lt;</button>
                    <button class="button secondary small carousel-step-button" id="carousel-step-right" type="button" aria-label="Move carousel right">&gt;</button>
                </div>
                <button class="icon-button" type="button" data-close-all-items aria-label="Close popup">x</button>
            </div>
        </header>
        <div class="carousel-filter-panel" id="carousel-filter-panel" hidden>
            <form class="carousel-filter-form" id="carousel-filter-form">
                <div>
                    <h3>Choose visibility</h3>
                    <p class="muted">Only entries with selected visibility levels will be displayed.</p>
                </div>
                <div class="tag-check-list">
                    {% for tag in tag_choices %}
                        <label class="tag-check">
                            <input type="checkbox" name="carousel_tags" value="{{ tag }}" checked>
                            <span>
                                <strong>{{ tag }}</strong>
                                <small>{{ privacy_labels[tag] }}</small>
                            </span>
                        </label>
                    {% endfor %}
                </div>
                <button class="button primary" type="submit">Start</button>
            </form>
        </div>
        <div class="carousel-stage" id="carousel-stage" hidden>
            <div class="carousel-playback-progress" id="carousel-playback-progress" hidden>
                <span id="carousel-playback-fill" aria-hidden="true"></span>
                <progress id="carousel-playback-bar" max="100" value="0" aria-label="Carousel item progress"></progress>
            </div>
            <article class="carousel-card" id="carousel-card"></article>
            <p class="empty-state carousel-empty" id="carousel-empty" hidden>No entries yet.</p>
        </div>
    </section>
</div>

<div class="modal" id="carousel-photo-modal" hidden>
    <div class="modal-backdrop" data-close-carousel-photo-modal></div>
    <section class="modal-panel photo-modal-panel carousel-photo-modal-panel" role="dialog" aria-modal="true" aria-labelledby="carousel-photo-modal-title">
        <header class="modal-header">
            <div>
                <h2 id="carousel-photo-modal-title">Picture</h2>
                <p id="carousel-photo-modal-date" class="muted"></p>
                <p id="carousel-photo-modal-caption" class="photo-caption-view"></p>
            </div>
            <button class="icon-button" type="button" data-close-carousel-photo-modal aria-label="Close popup">x</button>
        </header>
        <div class="carousel-photo-modal-body">
            <img id="carousel-photo-modal-image" class="modal-image" alt="Selected carousel picture">
        </div>
    </section>
</div>
